services:
  postgres:
    image: postgres:16-alpine
    container_name: cloudtutor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cloudtutor
      POSTGRES_PASSWORD: cloudtutor
      POSTGRES_DB: cloudtutor
    ports:
      - "5432:5432"
    volumes:
      - cloudtutor_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudtutor -d cloudtutor"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cloudtutor_pgdata:
